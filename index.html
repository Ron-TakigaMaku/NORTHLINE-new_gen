<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Anton&display=swap"
			rel="stylesheet"
		/>
		<title>NORTHLINE</title>
		<link rel="stylesheet" href="css/style.min.css" />
	</head>
	<body>
		<header class="header">
			<div class="container">
				<div class="header__container">
					<span class="header__logo">NORTHLINE</span>
					<nav class="header__nav">
						<ul class="header__list">
							<li class="header__item">
								<a href="#" class="header__link">Gallery</a>
							</li>
							<li class="header__item">
								<a href="#" class="header__link">Collection</a>
							</li>
							<li class="header__item">
								<a href="#" class="header__link">Find Us</a>
							</li>
						</ul>
					</nav>
				</div>
			</div>
		</header>

		<main class="hero">
			<div class="hero__list"></div>
		</main>

		<section id="story" class="manifest">
			<div class="manifest__list"></div>
		</section>

		<section class="gallery" id="gallery">
			<ul class="gallery__list"></ul>
		</section>

		<script type="module" src="./js/page/main.js"></script>

		<div class="modal--open" id="gallery-modal">
			<div class="gallery-modal__overlay"></div>
			<div class="gallery-modal__window">
				<button class="gallery-modal__close">✕</button>
				<div class="gallery-modal__body"></div>
			</div>
		</div>
	</body>
</html>
