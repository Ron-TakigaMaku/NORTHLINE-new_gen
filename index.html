<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Anton&display=swap"
			rel="stylesheet"
		/>
		<title>NORTHLINE</title>
		<link rel="stylesheet" href="css/style.min.css" />
	</head>
	<body>
		<header class="header">
			<div class="container">
				<div class="header__container">
					<span class="header__logo">NORTHLINE</span>
					<nav class="header__nav">
						<ul class="header__list">
							<li class="header__item">
								<a href="#manifest" class="header__link">MANIFEST</a>
							</li>
							<li class="header__item">
								<a href="#gallery" class="header__link">Gallery</a>
							</li>
							<li class="header__item">
								<a href="#findUs" class="header__link">Find Us</a>
							</li>
						</ul>
					</nav>
				</div>
			</div>
		</header>

		<main class="hero">
			<div class="hero__list"></div>
		</main>

		<section id="manifest" class="manifest">
			<div class="manifest__list"></div>
		</section>

		<section class="gallery" id="gallery">
			<ul class="gallery__list"></ul>
		</section>

		<section id="#" class="about">
			<section class="container">
				<section class="about__wrapper">
					<div class="about__track" id="track"></div>
				</section>
				<section class="about__nav">
					<section class="about__dots" id="dots"></section>
					<div class="about__counter"></div>
					<section class="about__btns">
						<button class="about__prev" aria-label="Назад">←</button>
						<button class="about__next" aria-label="Вперёд">→</button>
					</section>
				</section>
			</section>
		</section>

		<!-- MODAL -->
		<div class="modal" id="product-modal">
			<div class="modal__overlay"></div>
			<div class="modal__window">
				<button class="modal__close">✕</button>
				<div class="modal__body"></div>
			</div>
		</div>

		<!-- SCRIPT -->
		<script type="module" src="./js/page/main.js"></script>
	</body>
</html>
